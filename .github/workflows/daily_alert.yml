name: 아침 일일 요약 알림

on:
  schedule:
    - cron: '0 23 * * 0-5'  # KST 08:00 (UTC 23:00, 일~금)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily summary
        env:
          TELEGRAM_TEST_BOT_TOKEN: ${{ secrets.TELEGRAM_TEST_BOT_TOKEN }}
          TELEGRAM_TEST_CHAT_ID: ${{ secrets.TELEGRAM_TEST_CHAT_ID }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python main.py --daily

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/previous_state.json
          git diff --cached --quiet || git commit -m "chore: update daily state"
          git push
