name: VIX Alert (Phase 0)

on:
  schedule:
    - cron: '0 * * * 1-5'    # 평일 매시간 (UTC)
    - cron: '0 9,21 * * 0,6' # 주말 09:00, 21:00 UTC
  workflow_dispatch:           # 수동 실행 지원

permissions:
  contents: write

jobs:
  vix-alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run VIX alert
        env:
          TELEGRAM_TEST_BOT_TOKEN: ${{ secrets.TELEGRAM_TEST_BOT_TOKEN }}
          TELEGRAM_TEST_CHAT_ID: ${{ secrets.TELEGRAM_TEST_CHAT_ID }}
        run: python main.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/previous_state.json
          git diff --cached --quiet || git commit -m "chore: update vix state"
          git push
